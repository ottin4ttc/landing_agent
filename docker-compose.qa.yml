# landingAgent-specific (not upstream openclaw): adds the qa-monitor service.
# Use together with the base compose:
#   docker compose -f docker-compose.yml -f docker-compose.qa.yml up -d
# qa-monitor reads the gateway's session files from the same host config dir
# (mounted read-only) — no gateway RPC/auth needed.
services:
  qa-monitor:
    image: qa-monitor:main
    restart: unless-stopped
    environment:
      QA_AGENTS_DIR: /gateway-state/agents
      QA_FEISHU_APP_ID: ${QA_FEISHU_APP_ID:-}
      QA_FEISHU_APP_SECRET: ${QA_FEISHU_APP_SECRET:-}
      QA_FEISHU_REDIRECT_URL: ${QA_FEISHU_REDIRECT_URL:-}
      QA_ADMIN_ALLOWED_USERS: ${QA_ADMIN_ALLOWED_USERS:-}
      QA_PORT: "19010"
      QA_DB_PATH: /data/qa.db
      QA_POLL_INTERVAL_MS: "180000"
      QA_COOKIE_SECURE: "false"
    volumes:
      # gateway's config dir (contains agents/<id>/sessions), read-only.
      - "${OPENCLAW_CONFIG_DIR:-${HOME:-/tmp}/.openclaw}:/gateway-state:ro"
      - qa-data:/data
    ports:
      - "19010:19010"

volumes:
  qa-data:
