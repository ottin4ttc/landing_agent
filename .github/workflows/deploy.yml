# landingAgent-specific: build the fork image in CI (good network) and deploy
# it to the Baidu Cloud BCC over SSH by shipping a docker image tarball
# (no external registry needed). Gateway first; qa-monitor added later.
name: deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: deploy-bcc
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build gateway image
        run: |
          docker build -t landing-agent:main -f Dockerfile .

      - name: Save image to tarball
        run: |
          docker save landing-agent:main | gzip > /tmp/landing-agent.tar.gz
          ls -lh /tmp/landing-agent.tar.gz

      - name: Prepare SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy image + compose to BCC
        run: |
          SSH="ssh -i ~/.ssh/id_deploy ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          SCP="scp -i ~/.ssh/id_deploy"
          $SSH 'mkdir -p /opt/landing-agent'
          $SCP /tmp/landing-agent.tar.gz "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/landing-agent/"
          $SCP docker-compose.yml "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/landing-agent/"

      - name: Load image + restart gateway on BCC
        run: |
          ssh -i ~/.ssh/id_deploy ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'bash -s' <<'REMOTE'
          set -e
          cd /opt/landing-agent
          gunzip -c landing-agent.tar.gz | docker load
          # .env pins the image tag the compose file uses; created once on the host.
          grep -q '^OPENCLAW_IMAGE=' .env 2>/dev/null || echo 'OPENCLAW_IMAGE=landing-agent:main' >> .env
          docker compose up -d openclaw-gateway
          docker compose ps
          rm -f landing-agent.tar.gz
          REMOTE
