# landingAgent-specific: build + run on a self-hosted runner ON the Baidu BCC,
# so the image never crosses the border. Source is cloned through a CN GitHub
# proxy (gh-proxy) because direct github.com checkout is throttled cross-border.
# Build uses CN mirrors (npmmirror for deps; docker daemon registry-mirror for
# base images). Only the feishu extension is bundled (skips matrix's
# GitHub-release native download).
name: deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: deploy-bcc
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: [self-hosted, bcc]
    timeout-minutes: 120
    steps:
      - name: Checkout via gh-proxy (fast in CN, public repo)
        run: |
          rm -rf src
          git clone --depth 1 --branch main \
            https://gh-proxy.com/https://github.com/ottin4ttc/landing_agent src

      - name: Inject CN npm mirror (ephemeral, not committed)
        working-directory: src
        run: |
          {
            echo "registry=https://registry.npmmirror.com/"
            echo "fetch-timeout=1200000"
            echo "fetch-retries=6"
          } >> .npmrc

      - name: Build gateway image (feishu only)
        working-directory: src
        run: |
          docker build \
            --build-arg OPENCLAW_EXTENSIONS=feishu \
            -t landing-agent:main \
            -f Dockerfile .

      - name: Start gateway on BCC
        working-directory: src
        run: |
          install -d /opt/landing-agent
          cp docker-compose.yml /opt/landing-agent/
          cd /opt/landing-agent
          grep -q '^OPENCLAW_IMAGE=' .env 2>/dev/null || echo 'OPENCLAW_IMAGE=landing-agent:main' >> .env
          docker compose up -d openclaw-gateway
          sleep 5
          docker compose ps
