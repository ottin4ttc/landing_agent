# landingAgent-specific: build + run on a self-hosted runner ON the Baidu BCC,
# so the image never crosses the border. Source is cloned through a CN GitHub
# proxy (gh-proxy) because direct github.com checkout is throttled cross-border.
# Build uses CN mirrors (npmmirror for deps; docker daemon registry-mirror for
# base images). Only the feishu extension is bundled (skips matrix's
# GitHub-release native download).
name: deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: deploy-bcc
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: [self-hosted, bcc]
    timeout-minutes: 120
    steps:
      - name: Checkout via gh-proxy (fast in CN, public repo)
        run: |
          rm -rf src
          git clone --depth 1 --branch main \
            https://gh-proxy.com/https://github.com/ottin4ttc/landing_agent src

      - name: Inject CN build mirrors + network tuning (ephemeral, not committed)
        working-directory: src
        run: |
          # registry override lives in .npmrc
          echo "registry=https://registry.npmmirror.com/" >> .npmrc
          # pnpm v11 reads network settings from pnpm-workspace.yaml, NOT .npmrc.
          # Throttle parallel fetches so the big native tarballs (codex/copilot/
          # node-llama-cpp/claude-agent-sdk, ~30MB each) get full bandwidth on the
          # ~1MB/s cross-border link and don't hit the per-request timeout.
          printf '\nnetworkConcurrency: 2\nfetchTimeout: 1800000\nfetchRetries: 6\n' >> pnpm-workspace.yaml

      - name: Build gateway image (feishu only)
        working-directory: src
        run: |
          docker build \
            --build-arg OPENCLAW_EXTENSIONS=feishu \
            -t landing-agent:main \
            -f Dockerfile .

      - name: Build qa-monitor image
        working-directory: src
        run: |
          docker build \
            -t qa-monitor:main \
            -f packages/qa-monitor/Dockerfile .

      - name: Start gateway + qa-monitor on BCC
        working-directory: src
        run: |
          install -d /opt/landing-agent
          cp docker-compose.yml docker-compose.qa.yml /opt/landing-agent/
          cd /opt/landing-agent
          grep -q '^OPENCLAW_IMAGE=' .env 2>/dev/null || echo 'OPENCLAW_IMAGE=landing-agent:main' >> .env
          docker compose -f docker-compose.yml -f docker-compose.qa.yml up -d
          sleep 6
          docker compose -f docker-compose.yml -f docker-compose.qa.yml ps
